<!DOCTYPE html>
<html>
<head>
    <title>Even or Odd Number Checker</title>
</head>
<body>
    <h1>Even or Odd Number Checker</h1>
    
    <input type="number" id="numberInput" placeholder="Enter a number">
    <button onclick="checkEvenOdd()">Check Even/Odd</button>
    
    <p id="result"></p>

    <script>
        function checkEvenOdd() {
            // Get the input value
            let number = parseInt(document.getElementById("numberInput").value);
            
            // Check if the number is even or odd
            if (number % 2 === 0) {
                document.getElementById("result").innerHTML = number + " is an even number.";
            } else {
                document.getElementById("result").innerHTML = number + " is an odd number.";
            }
        }
    </script>
</body>
</html>
