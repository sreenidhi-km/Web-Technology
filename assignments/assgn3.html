<!DOCTYPE html>
<html>
<head>
    <title>Shopping Calculator</title>
</head>
<body>
    <h1>Shopping Cost Calculator</h1>
    
    <div>
        <label for="price">Price per item (₹):</label>
        <input type="number" id="price" min="0" step="0.01">
    </div>
    <div>
        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" min="1" value="1">
    </div>
    <div>
        <button onclick="calculateTotal()">Calculate Total</button>
    </div>
    <div>
        <h2 id="result"></h2>
    </div>
    
    <script>
        function calculateTotal() {
            // Get input values
            let price = document.getElementById("price").value;
            let quantity = document.getElementById("quantity").value;
            
            // Convert to numbers and calculate
            price = Number(price);
            quantity = Number(quantity);
            let total = price * quantity;
            
            // Display the result
            document.getElementById("result").innerHTML = "Total Cost: ₹" + total.toFixed(2);
        }
    </script>
</body>
</html>
