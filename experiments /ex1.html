<!DOCTYPE html>
<html>
<head>
    <title>Change title Example</title>
</head>
<body>
    <h1 id="heading">Original Heading</h1>
    <button onclick="changeHeading()">Change Heading</button>

    <script>
        function changeHeading() {
            document.getElementById("heading").innerHTML = "This is the new heading !!";
        }
    </script>
</body>
</html>
